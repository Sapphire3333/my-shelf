<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shelf</title>
<style>
  :root{
    --bg:#faf7f2; --card:#ffffff; --ink:#292524; --mut:#78716c; --faint:#a8a29e;
    --line:#e7e5e4; --teal:#0f766e; --teal-d:#115e59; --amber:#f59e0b; --rose:#e11d48;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 "Segoe UI",system-ui,sans-serif}
  .serif{font-family:Georgia,"Times New Roman",serif}
  .wrap{max-width:900px;margin:0 auto;padding:0 16px 96px}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font:inherit;color:var(--ink)}
  input:focus,select:focus,[contenteditable]:focus{outline:none;border-color:#2dd4bf!important}
  ::placeholder{color:var(--faint)}

  /* header */
  header{padding-top:32px}
  h1{margin:0;font-size:30px}
  .sub{color:var(--mut);font-size:13px;margin-top:2px}
  .hrow{display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
  .addbtn{background:var(--teal);color:#fff;border-radius:12px;padding:10px 16px;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .addbtn:hover{background:var(--teal-d)}
  .tabs{display:flex;gap:4px;background:#e7e5e488;border-radius:12px;padding:4px;margin-top:16px}
  .tab{flex:1;padding:8px;border-radius:8px;font-size:14px;font-weight:500;color:var(--mut)}
  .tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .bkrow{display:flex;gap:14px;align-items:center;margin-top:8px;font-size:12px;color:var(--mut);flex-wrap:wrap}
  .bkrow button:hover{color:var(--teal)}
  .bkrow button:disabled{opacity:.4;cursor:default}
  .busy{color:var(--teal)}

  /* chips & badges */
  .chip{display:inline-flex;align-items:center;gap:4px;border-radius:999px;color:#fff;font-size:12px;padding:2px 9px;margin:1px}
  .chip.big{font-size:14px;padding:4px 11px}
  .chip .x{opacity:.8;font-weight:700;padding:0 1px}
  .chip .x:hover{opacity:1}
  .rate{display:inline-flex;align-items:center;gap:3px;background:#fef3c7;border:1px solid #fcd34d;color:#92400e;font-weight:600;font-size:13px;border-radius:6px;padding:1px 7px;white-space:nowrap}
  .bdnf{background:#e7e5e4;color:#57534e;font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;letter-spacing:.5px}
  .bst{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px}
  .bst.reading{background:#ccfbf1;color:#0f766e}.bst.want{background:#fef3c7;color:#b45309}
  .fav{color:var(--rose)}

  /* library rows */
  .row{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:.15s}
  .row:hover{border-color:#5eead4;box-shadow:0 3px 8px rgba(0,0,0,.08)}
  .thumb{width:48px;height:64px;flex:none;border:1px solid var(--line);border-radius:6px;background:#f5f5f4;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#d6d3d1;font-size:20px}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .rmain{flex:1;min-width:0}
  .rtitle{font-weight:600;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .rauth{color:var(--mut);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rser{color:var(--faint);font-size:12px}
  .rside{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .rr{font-size:10px;color:var(--faint)}
  .rdel{color:#d6d3d1;border-radius:6px;padding:2px 6px;opacity:0}
  .row:hover .rdel{opacity:1}
  .rdel:hover{color:var(--rose);background:#fff1f2}

  /* grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:14px}
  .gcard{cursor:pointer}
  .gcov{position:relative;aspect-ratio:2/3;border:1px solid var(--line);border-radius:10px;background:#f5f5f4;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:.15s;display:flex;align-items:center;justify-content:center;color:#d6d3d1;font-size:24px}
  .gcard:hover .gcov{border-color:#5eead4;box-shadow:0 3px 8px rgba(0,0,0,.1)}
  .gcov img{width:100%;height:100%;object-fit:cover}
  .gfav{position:absolute;top:5px;right:6px;color:var(--rose);text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .grate{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.6);color:#fcd34d;font-size:11px;font-weight:700;border-radius:4px;padding:1px 5px}
  .gdnf{position:absolute;bottom:4px;right:4px;background:rgba(68,64,60,.85);color:#fff;font-size:9px;font-weight:700;border-radius:4px;padding:1px 4px}
  .gst{position:absolute;top:4px;left:4px;font-size:9px;font-weight:700;border-radius:4px;padding:1px 4px}
  .gst.reading{background:var(--teal);color:#fff}.gst.want{background:#fbbf24;color:#78350f}
  .gtitle{font-weight:600;font-size:12px;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gauth{font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* filter pills */
  .pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;font-size:13px;align-items:center}
  .pill{border:1px solid var(--line);background:#fff;color:var(--mut);border-radius:999px;padding:4px 10px}
  .pill:hover{border-color:#5eead4}
  .pill.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .pill.on2{background:#44403c;border-color:#44403c;color:#fff}
  .laybtn{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 9px;color:var(--mut)}
  .laybtn:hover{border-color:#5eead4}

  /* generic */
  .field{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:9px 12px}
  .sec h2{font-size:17px;margin:0 0 8px}
  .sec{margin-bottom:26px}
  .hint{font-size:12px;color:var(--faint);margin:2px 0 8px}
  .empty{border:2px dashed var(--line);border-radius:16px;text-align:center;padding:56px 16px;color:var(--mut)}
  .none{color:var(--faint);font-size:13px}

  /* editor */
  .edbar{position:sticky;top:0;z-index:50;background:#faf7f2f2;backdrop-filter:blur(4px);border-bottom:1px solid var(--line);margin:0 -16px 16px;padding:0 16px}
  .edbar .r1{display:flex;align-items:center;gap:8px;padding:9px 0}
  .edbar .r2{display:flex;align-items:center;gap:7px;padding:6px 0;border-top:1px solid #e7e5e4aa;flex-wrap:wrap}
  .backbtn{display:flex;align-items:center;gap:4px;color:var(--mut);border-radius:8px;padding:5px 8px}
  .backbtn:hover{background:#e7e5e4}
  .savemsg{font-size:12px;margin-left:auto}
  .savemsg.ok{color:#059669}.savemsg.no{color:var(--faint)}
  .delbtn{color:var(--faint);border-radius:8px;padding:5px 8px}
  .delbtn:hover{color:var(--rose);background:#fff1f2}
  .tbtn{border:none;border-radius:6px;padding:4px 8px;color:#57534e;font-weight:700}
  .tbtn:hover{background:#e7e5e4}
  .tbtn.i{font-style:italic}.tbtn.u{text-decoration:underline}
  .cdot{width:15px;height:15px;border-radius:50%;padding:0;border:1px solid rgba(0,0,0,.1)}
  .cdot:hover{transform:scale(1.2)}
  .vline{width:1px;height:16px;background:#d6d3d1;margin:0 3px}
  .sm{border:1px solid var(--line);background:#fff;border-radius:7px;padding:3px 8px;font-size:12px;color:var(--mut);display:flex;align-items:center;gap:4px}
  .sm:hover{border-color:#5eead4}
  .sm.on{background:var(--teal);border-color:var(--teal);color:#fff}

  .edhead{display:flex;gap:20px;flex-wrap:wrap}
  .coverbox{width:160px;height:224px;flex:none;border:2px dashed #d6d3d1;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;color:var(--faint);font-size:13px;text-align:center}
  .coverbox:hover{border-color:#2dd4bf}
  .coverbox img{width:100%;height:100%;object-fit:cover}
  .edfields{flex:1;min-width:260px;display:flex;flex-direction:column;gap:11px}
  .titlein{font-size:20px;font-weight:600}
  .relbox{position:relative}
  .sug{position:absolute;z-index:40;left:0;right:0;top:100%;margin-top:3px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.12);overflow:hidden}
  .sug button{display:block;width:100%;text-align:left;padding:8px 12px;font-size:14px}
  .sug button:hover{background:#f0fdfa}
  .inrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .mini{width:48px;text-align:center;border:1px solid var(--line);border-radius:9px;background:#fff;padding:8px 4px;font-size:14px}
  .lbl{font-size:12px;color:var(--faint)}
  .seg{display:inline-flex;border:1px solid var(--line);background:#fff;border-radius:10px;padding:3px;gap:2px;width:fit-content}
  .seg button{border-radius:7px;padding:6px 12px;font-size:13px;color:var(--mut)}
  .seg button.fin{background:#44403c;color:#fff}.seg button.rea{background:var(--teal);color:#fff}.seg button.wan{background:#fbbf24;color:#78350f}
  .boxbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 12px;font-size:13px;color:var(--mut);font-weight:500}
  .boxbtn.favon{border-color:#fda4af;background:#fff1f2;color:var(--rose)}
  .boxbtn.dnfon{border-color:#78716c;background:#44403c;color:#fff;font-weight:700}
  .ratebox{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:5px 12px}
  .ratebox input{width:60px;border:none;text-align:center;font-weight:600;font-size:15px}
  .cnt{width:24px;height:24px;border-radius:7px;background:#f5f5f4;font-weight:700;color:#57534e}
  .cnt:hover{background:#e7e5e4}
  .dnfbox{border:1px solid #d6d3d1;background:#fafaf9;border-radius:10px;padding:12px}
  .dnfbox .cap{font-size:11px;font-weight:700;letter-spacing:.7px;color:var(--mut);text-transform:uppercase;margin-bottom:7px}
  .rsn{border:1px solid #d6d3d1;background:#fff;border-radius:999px;font-size:12px;padding:3px 10px;color:#57534e;margin:2px}
  .rsn.on{background:#44403c;border-color:#57534e;color:#fff}
  .colorpick{border:1px solid var(--line);background:#fff;border-radius:10px;padding:12px;margin-top:8px}
  .colorpick .dots{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .colorpick .cdot{width:26px;height:26px}
  .cap2{font-size:12px;font-weight:700;letter-spacing:.8px;color:var(--mut);text-transform:uppercase;margin:22px 0 6px}
  .rich{min-height:110px;border:1px solid var(--line);border-radius:10px;background:#fff;padding:12px}
  .rich:empty:before{content:attr(data-ph);color:var(--faint);pointer-events:none}
  .lists{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  @media(max-width:640px){.lists{grid-template-columns:1fr}}
  .lbox{border-radius:14px;border:1px solid;padding:12px}
  .lbox.plus{border-color:#a7f3d0;background:#ecfdf588}.lbox.plus h3{color:#047857}
  .lbox.minus{border-color:#fecdd3;background:#fff1f288}.lbox.minus h3{color:#be123c}
  .lbox.quote{border-color:#c7d2fe;background:#eef2ff66;margin-top:14px}.lbox.quote h3{color:#4338ca}
  .lbox h3{margin:0 0 8px;font-size:14px}
  .li{display:flex;gap:8px;align-items:flex-start;font-size:14px;margin-bottom:6px}
  .li .dot{width:6px;height:6px;border-radius:50%;flex:none;margin-top:7px}
  .li .qm{color:#818cf8;flex:none;font-family:Georgia,serif;font-size:17px;line-height:1.1}
  .li [contenteditable]{flex:1;min-width:0}
  .li.q [contenteditable]{font-style:italic;font-family:Georgia,serif}
  .li .lx{color:#d6d3d1;padding:0 3px;opacity:0}
  .li:hover .lx{opacity:1}
  .li .lx:hover{color:var(--rose)}
  .addin{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;padding:7px 9px;font-size:13px;margin-top:4px}

  /* floating scrapbook images */
  #edPage{position:relative}
  .scrap{position:absolute;z-index:30;pointer-events:none;user-select:none}
  .scrap img{width:100%;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.18);display:block}
  .scrap.bh{opacity:.4}
  #edPage.arr .scrap{pointer-events:auto;z-index:40;cursor:move}
  #edPage.arr .scrap.bh{opacity:.6}
  #edPage.arr .scrap img{outline:2px solid #2dd4bf;box-shadow:0 6px 16px rgba(0,0,0,.25)}
  .sbar{position:absolute;top:-32px;left:0;display:none;gap:3px;background:#292524;border-radius:7px;padding:3px 5px}
  #edPage.arr .sbar{display:flex}
  .sbar button{color:#fff;border-radius:5px;padding:2px 6px;font-size:13px}
  .sbar button:hover{background:#57534e}
  .sbar .sfade.on{background:var(--teal)}
  .sbar .sdel:hover{background:var(--rose)}
  .rs{position:absolute;right:-6px;bottom:-6px;width:15px;height:15px;background:#14b8a6;border-radius:4px;cursor:nwse-resize;display:none;box-shadow:0 1px 3px rgba(0,0,0,.3)}
  #edPage.arr .rs{display:block}

  /* search page */
  .searchbox{position:relative;margin-bottom:4px}
  .searchbox .field{padding-left:36px}
  .searchbox .sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .deep{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--mut);margin-bottom:18px}
  .colbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid;border-radius:10px;padding:8px 12px;font-size:13px;margin:2px}
  .colbtn:disabled{opacity:.4;cursor:default}
  .colbtn.f{border-color:#fecdd3;background:#fff1f2;color:#be123c}
  .colbtn.r{border-color:#99f6e4;background:#f0fdfa;color:#0f766e}
  .colbtn.w{border-color:#fde68a;background:#fffbeb;color:#b45309}
  .colbtn.d{border-color:#a8a29e;background:#f5f5f4;color:#44403c}
  .pickbox{border:1px solid #ddd6fe;background:#f5f3ff88;border-radius:14px;padding:12px}
  .pickbox h2{color:#6d28d9}
  .pickbtn{background:#7c3aed;color:#fff;border-radius:9px;padding:6px 16px;font-weight:600;font-size:13px}
  .pickbtn:hover{background:#6d28d9}
  .aut{border:1px solid #d6d3d1;background:#fff;border-radius:999px;font-size:13px;padding:4px 11px;margin:2px}
  .aut:hover{border-color:#2dd4bf;background:#f0fdfa}
  .aut b{color:var(--teal)}
  .clearbtn{margin-left:auto;color:var(--teal);font-size:13px}
  .clearbtn:hover{text-decoration:underline}
  .heading{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .heading h2{margin:0;font-size:17px}
  .heading .n{color:var(--faint);font-size:13px}
  .rbuckets{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
  .rb{display:flex;justify-content:space-between;border:1px solid;border-radius:9px;padding:7px 11px;font-size:13px}
  .rb.has{border-color:#fde68a;background:#fffbeb;color:#44403c}
  .rb.has:hover{border-color:#f59e0b}
  .rb.no{border-color:var(--line);background:#fff;color:#d6d3d1;cursor:default}
  .mg{display:inline-flex;align-items:center;gap:6px;border:1px solid #d6d3d1;background:#fff;border-radius:999px;font-size:13px;padding:4px 11px;margin:2px;color:#44403c}
  .mg .bx{width:13px;height:13px;border:1px solid #a8a29e;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px}
  .mg.on{color:#fff}
  .mg.on .bx{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.2)}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
  .stat{border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px}
  .stat .v{font-size:22px;font-weight:700;font-family:Georgia,serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stat .k{font-size:11px;color:var(--mut);margin-top:2px}
  .spread{border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px;margin-top:8px}
  .spread .bars{display:flex;align-items:flex-end;gap:4px;height:58px}
  .spread .bcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px}
  .spread .bar{width:100%;background:#fbbf24;border-radius:3px 3px 0 0}
  .spread .bn{font-size:9px;color:var(--faint)}
  .axis{display:flex;justify-content:space-between;font-size:9px;color:var(--faint);margin-top:3px}
  .foot{margin-top:40px;font-size:11px;color:var(--faint);text-align:center}
  .kw{display:inline-flex;align-items:center;gap:3px;border:1px solid #d6d3d1;background:#fafaf9;color:#57534e;font-weight:700;font-size:10px;border-radius:5px;padding:0 5px;margin:1px}
  .ovh{display:flex;align-items:center;gap:8px;margin:0 0 8px}
  #edPage.tagmode [contenteditable]{cursor:crosshair}
  .sm.tag-on{background:#fbbf24;border-color:#f59e0b;color:#78350f;font-weight:700}

  /* auth + sync */
  .authwrap{max-width:400px;margin:60px auto 0;padding:0 20px}
  .authcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 24px;box-shadow:0 6px 24px rgba(0,0,0,.06)}
  .authcard h1{font-size:34px;text-align:center;margin:0}
  .authcard .tag{color:var(--mut);font-size:13px;text-align:center;margin:5px 0 20px}
  .authcard label{display:block;font-size:12px;color:var(--faint);margin:12px 0 3px}
  .authcard input{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:11px 13px}
  .authcard .go{width:100%;background:var(--teal);color:#fff;border-radius:10px;padding:12px;font-weight:600;margin-top:18px}
  .authcard .go:hover{background:var(--teal-d)}
  .authcard .go:disabled{opacity:.5;cursor:default}
  .authcard .alt{display:flex;justify-content:space-between;gap:8px;margin-top:14px;font-size:13px}
  .authcard .alt button{color:var(--teal)}
  .authcard .alt button:hover{text-decoration:underline}
  .authmsg{font-size:13px;margin-top:14px;text-align:center;min-height:18px;line-height:1.35}
  .authmsg.err{color:var(--rose)}.authmsg.ok{color:#059669}
  .acct{display:flex;align-items:center;gap:10px;margin-top:7px;font-size:12px;flex-wrap:wrap}
  .acct .who{color:var(--faint)}
  .acct .out{color:var(--teal)}
  .acct .out:hover{text-decoration:underline}
  .syncstat{font-size:12px}
  .syncstat.ok{color:#059669}.syncstat.no{color:var(--faint)}

  /* overview hub */
  .hcard{border:1px solid var(--line);background:var(--card);border-radius:14px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .hrow2{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .bar{height:9px;border-radius:999px;background:#e7e5e4;overflow:hidden;margin:9px 0 7px}
  .bar i{display:block;height:100%;background:var(--teal);border-radius:999px;transition:width .3s}
  .bar i.warn{background:var(--amber)}
  .bar i.full{background:var(--rose)}
  .bignum{font-family:Georgia,serif;font-size:21px;font-weight:700}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:8px 13px;font-size:13px;color:var(--ink);font-weight:500}
  .btn:hover{border-color:#2dd4bf;background:#f0fdfa}
  .btn.pri{background:var(--teal);border-color:var(--teal);color:#fff}
  .btn.pri:hover{background:var(--teal-d)}
  .btn:disabled{opacity:.45;cursor:default}
  .btn.danger:hover{border-color:#fda4af;background:#fff1f2;color:var(--rose)}
  .snap{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:8px 11px;margin-top:6px;font-size:13px;background:#fff}
  .snap .when{font-weight:600}
  .snap .meta{color:var(--faint);font-size:12px}
  .snap .sp{margin-left:auto;display:flex;gap:6px}
  .tagx{font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;background:#ccfbf1;color:#0f766e}
  .tagx.man{background:#fef3c7;color:#b45309}
  .grouphead{display:flex;align-items:center;gap:8px;margin:20px 0 8px}
  .grouphead .n{color:var(--faint);font-size:13px}
  .ghline{flex:1;height:1px;background:var(--line)}

function wordRange(r){
  const node=r.startContainer;
  if(node.nodeType!==3)return null;
  const text=node.textContent||"";
  let s=r.startOffset,e=r.startOffset;
  const isW=c=>/[\w'’-]/.test(c)||/[A-Za-zÀ-ÖØ-öø-ÿĀ-ž]/.test(c);
  while(s>0&&isW(text[s-1]))s--;
  while(e<text.length&&isW(text[e]))e++;
  if(e<=s)return null;
  const nr=document.createRange();nr.setStart(node,s);nr.setEnd(node,e);return nr;
}

function compressImage(file,maxDim=1000,quality=.82){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const img=new Image();
      img.onload=()=>{let{width,height}=img;
        if(width>maxDim||height>maxDim){const s=maxDim/Math.max(width,height);width=Math.round(width*s);height=Math.round(height*s);}
        const c=document.createElement("canvas");c.width=width;c.height=height;
        c.getContext("2d").drawImage(img,0,0,width,height);
        res(c.toDataURL("image/jpeg",quality));};
      img.onerror=rej;img.src=r.result;};
    r.onerror=rej;r.readAsDataURL(file);});
}

/* =============== IndexedDB =============== */
let db;
function openDb(){return new Promise((res,rej)=>{
  const r=indexedDB.open("myShelf",2);
  r.onupgradeneeded=()=>{const d=r.result;
    if(!d.objectStoreNames.contains("books"))d.createObjectStore("books",{keyPath:"id"});
    if(!d.objectStoreNames.contains("covers"))d.createObjectStore("covers",{keyPath:"id"});
    if(!d.objectStoreNames.contains("images"))d.createObjectStore("images",{keyPath:"key"});
    if(!d.objectStoreNames.contains("meta"))d.createObjectStore("meta",{keyPath:"k"});
    if(!d.objectStoreNames.contains("snapshots"))d.createObjectStore("snapshots",{keyPath:"id"});};
  r.onsuccess=()=>res(r.result);
  r.onerror=()=>rej(r.error);});}
const st=(s,m)=>db.transaction(s,m).objectStore(s);
const dbPut=(s,v)=>new Promise((res,rej)=>{const g=st(s,"readwrite").put(v);g.onsuccess=()=>res(true);g.onerror=()=>rej(g.error);});
const dbGet=(s,k)=>new Promise(res=>{const g=st(s,"readonly").get(k);g.onsuccess=()=>res(g.result||null);g.onerror=()=>res(null);});
const dbDel=(s,k)=>new Promise(res=>{const g=st(s,"readwrite").delete(k);g.onsuccess=()=>res();g.onerror=()=>res();});
const dbAll=s=>new Promise(res=>{const g=st(s,"readonly").getAll();g.onsuccess=()=>res(g.result||[]);g.onerror=()=>res([]);});
const dbAllKeys=s=>new Promise(res=>{const g=st(s,"readonly").getAllKeys();g.onsuccess=()=>res(g.result||[]);g.onerror=()=>res([]);});

/* =============== state =============== */
let books=[],genres={},dnfCustom=[],audCustom=[];
let settings={autoBackup:true,keepAuto:3,bg:{id:"none",opacity:100}};
let bgList=[];                 /* [{id,name}] custom backgrounds, images live at "__bg|<id>" */
const bgCache=new Map();
let activeBgPicker=null,bgPick=null;
let view="overview",sortBy="newest",layout="list",statusFilter="all",groupBy="none";
let cur=null,curCover=null,curImgs={},curEnt={},arrange=false,saveTimer=null,isNew=false;
const coverCache=new Map();
const S={q:"",scopes:["title"],authorQ:"",filter:null,multi:[],pickGenre:"any",pickWant:true,picked:null};
let deletions={};

/* =============== sync (Supabase — optional, offline-first) =============== */
const CFG=window.SHELF_CONFIG||{};
const SYNC={supa:null,user:null,on:false,queue:[],flushing:false,pulling:false,status:"local",triedCover:new Set()};

function syncConfigured(){
  return !!(CFG.url&&CFG.anonKey&&!/YOUR_/.test(String(CFG.url)+String(CFG.anonKey))
    &&window.supabase&&typeof window.supabase.createClient==="function");
}
function setSync(s){SYNC.status=s;updateSyncUI();}
function updateSyncUI(){
  const el=q("#syncStat");if(!el)return;
  const map={synced:["Synced ✓","ok"],syncing:["Syncing…","no"],offline:["Offline — will sync","no"],error:["Sync paused — will retry","no"],local:["",""]};
  const [t,c]=map[SYNC.status]||["",""];
  el.textContent=t;el.className="syncstat "+c;
}
function dataURLtoBlob(dataURL){
  const [head,b64]=String(dataURL).split(",");
  const mime=(head.match(/:(.*?);/)||[])[1]||"image/jpeg";
  const bin=atob(b64||""),len=bin.length,arr=new Uint8Array(len);
  for(let i=0;i<len;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function blobToDataURL(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});}
const coverPath=id=>`${SYNC.user.id}/covers/${id}.jpg`;
const imgPath=key=>`${SYNC.user.id}/images/${String(key).replace("|","__")}.jpg`;

async function loadSyncLocal(){
  const dq=await dbGet("meta","syncQueue");SYNC.queue=dq&&Array.isArray(dq.v)?dq.v:[];
  const dd=await dbGet("meta","deletions");deletions=dd&&dd.v?dd.v:{};
}
function saveQueue(){dbPut("meta",{k:"syncQueue",v:SYNC.queue});}
const opKey=o=>o.kind+":"+(o.id||o.key||"");
function enqueue(op){
  if(!SYNC.on)return;
  SYNC.queue=SYNC.queue.filter(o=>opKey(o)!==opKey(op));
  SYNC.queue.push(op);saveQueue();flushQueue();
}
function saveDeletions(){dbPut("meta",{k:"deletions",v:deletions});enqueue({kind:"meta",key:"deletions"});}

async function flushQueue(){
  if(!SYNC.on||!SYNC.user||SYNC.flushing)return;
  if(!navigator.onLine){setSync("offline");return;}
  if(!SYNC.queue.length){setSync("synced");return;}
  SYNC.flushing=true;setSync("syncing");
  try{
    while(SYNC.queue.length){
      await runOp(SYNC.queue[0]);
      SYNC.queue.shift();saveQueue();
    }
    setSync("synced");
  }catch(e){
    console.warn("[shelf] sync paused:",e&&e.message||e);
    setSync(navigator.onLine?"error":"offline");
  }finally{SYNC.flushing=false;}
}
async function runOp(op){
  const s=SYNC.supa,uid=SYNC.user.id;
  if(op.kind==="book"){
    const b=await dbGet("books",op.id);if(!b)return;
    const {error}=await s.from("books").upsert({user_id:uid,id:b.id,data:b,modified:b.modified||b.created||0});
    if(error)throw error;
  }else if(op.kind==="bookDel"){
    const {error}=await s.from("books").delete().eq("user_id",uid).eq("id",op.id);
    if(error)throw error;
  }else if(op.kind==="meta"){
    let value=op.key==="genres"?genres:op.key==="dnfReasons"?dnfCustom:op.key==="audiences"?audCustom:op.key==="deletions"?deletions:op.key==="backgrounds"?bgList:null;
    if(value==null){const r=await dbGet("meta",op.key);value=r?r.v:{};}
    const {error}=await s.from("meta").upsert({user_id:uid,key:op.key,value});
    if(error)throw error;
  }else if(op.kind==="cover"){
    const c=await dbGet("covers",op.id);
    if(c&&c.data){const {error}=await s.storage.from("shelf").upload(coverPath(op.id),dataURLtoBlob(c.data),{upsert:true,contentType:"image/jpeg"});if(error)throw error;}
  }else if(op.kind==="coverDel"){
    await s.storage.from("shelf").remove([coverPath(op.id)]);
  }else if(op.kind==="img"){
    const im=await dbGet("images",op.key);
    if(im&&im.data){const {error}=await s.storage.from("shelf").upload(imgPath(op.key),dataURLtoBlob(im.data),{upsert:true,contentType:"image/jpeg"});if(error)throw error;}
  }else if(op.kind==="imgDel"){
    await s.storage.from("shelf").remove([imgPath(op.key)]);
  }
}

async function pullAll(){
  if(!SYNC.on||!SYNC.user||SYNC.pulling)return;
  if(!navigator.onLine){setSync("offline");return;}
  SYNC.pulling=true;setSync("syncing");
  try{
    const s=SYNC.supa,uid=SYNC.user.id;
    // meta first (additive merge, local edits win)
    try{
      const {data:metaRows,error:me}=await s.from("meta").select("key,value").eq("user_id",uid);
      if(!me&&metaRows){
        for(const row of metaRows){
          if(row.key==="genres")genres=Object.assign({},row.value||{},genres);
          else if(row.key==="dnfReasons")dnfCustom=[...new Set([...(row.value||[]),...dnfCustom])];
          else if(row.key==="audiences")audCustom=[...new Set([...(row.value||[]),...audCustom])];
          else if(row.key==="deletions"){const rv=row.value||{};for(const k in rv)deletions[k]=Math.max(deletions[k]||0,rv[k]);}
          else if(row.key==="backgrounds"){const have=new Set(bgList.map(x=>x.id));
            (row.value||[]).forEach(x=>{if(x&&x.id&&!have.has(x.id))bgList.push(x);});}
        }
        metaSnap=JSON.stringify({genres,dnfCustom,audCustom});
        dbPut("meta",{k:"genres",v:genres});dbPut("meta",{k:"dnfReasons",v:dnfCustom});dbPut("meta",{k:"audiences",v:audCustom});dbPut("meta",{k:"deletions",v:deletions});dbPut("meta",{k:"backgrounds",v:bgList});
      }
    }catch(e){console.warn("[shelf] meta pull",e);}
    // books (per-book last-write-wins by `modified`)
    const {data:rows,error}=await s.from("books").select("id,data,modified").eq("user_id",uid);
    if(error){setSync(navigator.onLine?"error":"offline");return;}
    const localMap=new Map(books.map(b=>[b.id,b]));
    const remoteIds=new Set();
    for(const row of rows||[]){
      remoteIds.add(row.id);
      const rb=row.data||{};rb.id=row.id;rb.modified=row.modified||rb.modified||rb.created||0;
      const tomb=deletions[row.id]||0;
      if(tomb&&tomb>=(rb.modified||0))continue;
      const lb=localMap.get(row.id);
      if(!lb||(rb.modified||0)>(lb.modified||0)){
        await dbPut("books",rb);
        const i=books.findIndex(b=>b.id===row.id);
        if(i>=0)books[i]=rb;else books.push(rb);
        coverCache.delete(row.id);SYNC.triedCover.delete(row.id);
        await syncBookAssets(rb);
      }
    }
    // apply remote deletions locally
    for(const id of Object.keys(deletions)){
      const lb=books.find(b=>b.id===id);
      if(lb&&deletions[id]>=(lb.modified||0)){await dbDel("books",id);books=books.filter(b=>b.id!==id);}
    }
    // push up any local-only books the cloud hasn't seen yet (e.g. made offline or before first sync)
    for(const b of books){
      if(!remoteIds.has(b.id)&&!(deletions[b.id]>=(b.modified||0))){
        enqueue({kind:"book",id:b.id});enqueue({kind:"cover",id:b.id});
        imgKeysOf(b).forEach(key=>enqueue({kind:"img",key}));
      }
    }
    setSync("synced");
    if(view!=="book")render();
  }catch(e){
    console.warn("[shelf] pull failed",e);setSync(navigator.onLine?"error":"offline");
  }finally{SYNC.pulling=false;}
}
async function syncBookAssets(b){
  const s=SYNC.supa;
  try{
    const {data,error}=await s.storage.from("shelf").download(coverPath(b.id));
    if(!error&&data){const durl=await blobToDataURL(data);await dbPut("covers",{id:b.id,data:durl});coverCache.set(b.id,durl);}
    else{await dbDel("covers",b.id);coverCache.set(b.id,null);}
  }catch(e){}
  for(const key of imgKeysOf(b)){
    if(!(await dbGet("images",key))){
      try{const {data,error}=await s.storage.from("shelf").download(imgPath(key));
        if(!error&&data)await dbPut("images",{key,data:await blobToDataURL(data)});}catch(e){}
    }
  }
}
/* local first, then pull from Storage if this device hasn't got it yet */
async function loadImgData(key){
  const r=await dbGet("images",key);
  if(r)return r.data;
  if(SYNC.on&&SYNC.user&&navigator.onLine){
    try{const {data,error}=await SYNC.supa.storage.from("shelf").download(imgPath(key));
      if(!error&&data){const durl=await blobToDataURL(data);await dbPut("images",{key,data:durl});return durl;}}catch(e){}
  }
  return null;
}

/* ---- auth screen ---- */
function renderLogin(msg){
  q("#app").innerHTML=`
  <div class="authwrap"><div class="authcard">
    <h1 class="serif">My Shelf</h1>
    <div class="tag">Sign in to reach your library on any device.</div>
    <label>Email</label>
    <input id="auEmail" type="email" autocomplete="username" placeholder="you@example.com">
    <label>Password</label>
    <input id="auPass" type="password" autocomplete="current-password" placeholder="Your password">
    <button class="go" id="auGo">Sign in</button>
    <div class="alt">
      <button id="auSignup">Create an account</button>
      <button id="auMagic">Email me a link instead</button>
    </div>
    <div class="authmsg ${msg&&msg.err?"err":"ok"}" id="auMsg">${msg?esc(msg.text):""}</div>
  </div></div>`;
  const email=()=>q("#auEmail").value.trim(),pass=()=>q("#auPass").value;
  const setMsg=(text,err)=>{const el=q("#auMsg");el.textContent=text;el.className="authmsg "+(err?"err":"ok");};
  let mode="in";
  const busy=on=>{const g=q("#auGo");g.disabled=on;g.textContent=on?"…":(mode==="up"?"Create account":"Sign in");};
  q("#auGo").onclick=async()=>{
    if(!email()){setMsg("Enter your email.",true);return;}
    busy(true);
    try{
      if(mode==="up"){
        const {error}=await SYNC.supa.auth.signUp({email:email(),password:pass()});
        if(error)throw error;
        setMsg("Account created. If asked, confirm via the email we just sent, then sign in.",false);
        mode="in";
      }else{
        const {error}=await SYNC.supa.auth.signInWithPassword({email:email(),password:pass()});
        if(error)throw error; // onAuthStateChange takes over on success
      }
    }catch(e){setMsg(e.message||"That didn't work.",true);}
    busy(false);
  };
  q("#auSignup").onclick=()=>{mode="up";q("#auGo").textContent="Create account";setMsg("Pick a password (6+ characters), then press Create account.",false);};

async function initSync(){

  catch(e){console.warn("[shelf] supabase init failed",e);SYNC.on=false;render();return;}

    SYNC.user=data.session.user;render();flushQueue().then(pullAll);
  }else{

}

/* =============== backgrounds =============== */
const bgKey=id=>"__bg|"+id;
function saveBgList(){dbPut("meta",{k:"backgrounds",v:bgList});enqueue({kind:"meta",key:"backgrounds"});}
async function preloadBgs(){
  for(const c of bgList)if(!bgCache.has(c.id))bgCache.set(c.id,await loadImgData(bgKey(c.id)));
}
async function addCustomBg(file){
  if(!file||!file.type.startsWith("image/"))return null;
  let data;try{data=await compressImage(file,1600,.85);}catch(e){alert("That image couldn't be read.");return null;}
  const id=uid();
  try{await dbPut("images",{key:bgKey(id),data});}catch(e){alert("That background couldn't be saved — storage may be full.");return null;}
  bgList.push({id,name:(file.name||"My background").replace(/\.[^.]+$/,"").slice(0,26)||"My background"});
  bgCache.set(id,data);saveBgList();
  if(SYNC.on)enqueue({kind:"img",key:bgKey(id)});
  return id;
}
async function deleteCustomBg(id){
  bgList=bgList.filter(b=>b.id!==id);bgCache.delete(id);
  await dbDel("images",bgKey(id));
  saveBgList();
  if(SYNC.on)enqueue({kind:"imgDel",key:bgKey(id)});
  if(settings.bg&&settings.bg.id===id){settings.bg={id:"none",opacity:settings.bg.opacity??100};saveSettings();}
}
/* a book's own background wins; "default" (or nothing) falls back to the app-wide one */
function effectiveBg(){
  if(view==="book"&&cur&&cur.bg&&cur.bg.id&&cur.bg.id!=="default")return cur.bg;
  return settings.bg||{id:"none",opacity:100};
}
async function applyBg(){
  const el=q("#bgLayer");if(!el)return;
  const bg=effectiveBg();
  const op=Math.max(0,Math.min(100,bg.opacity==null?100:bg.opacity))/100;
  const pre=BG_PRESETS.find(p=>p.id===bg.id);
  if(pre){el.style.cssText=`opacity:${op};${pre.css}`;return;}
  let d=bgCache.get(bg.id);
  if(d===undefined){d=await loadImgData(bgKey(bg.id));bgCache.set(bg.id,d);}
  const el2=q("#bgLayer");if(!el2)return;
  el2.style.cssText=d?`opacity:${op};background-image:url("${d}")`:`opacity:${op}`;
}
/* one picker used by both the hub (app default) and the editor (this book) */
async function drawBgPicker(box,getBg,setBg,allowDefault){
  await preloadBgs();
  if(!box||!document.body.contains(box))return;
  const redraw=()=>drawBgPicker(box,getBg,setBg,allowDefault);
  const pick=id=>{setBg({id,opacity:(getBg()||{}).opacity??100});redraw();applyBg();};
  activeBgPicker={box,pick};
  const c0=getBg()||{id:"none",opacity:100};
  const op=c0.opacity==null?100:c0.opacity;
  const sw=(id,name,css,img,on,del)=>`<div class="bgsw ${on?"on":""}" data-bg="${id}" title="${esc(name)}">
      <div class="bgsw-p" style="${css||""}${img?`background-image:url('${img}')`:""}"></div>
      <span>${esc(name)}</span>${del?`<button class="bgx" data-bgx="${id}" title="Delete this background">✕</button>`:""}
    </div>`;
  box.innerHTML=`
    <div class="bgsws">
      ${allowDefault?sw("default","Use default","background:repeating-linear-gradient(45deg,#f5f5f4 0 6px,#e7e5e4 6px 12px)",null,c0.id==="default"||!c0.id):""}
      ${BG_PRESETS.map(p=>sw(p.id,p.name,p.css,null,c0.id===p.id)).join("")}
      ${bgList.map(c=>sw(c.id,c.name,"",bgCache.get(c.id)||"",c0.id===c.id,true)).join("")}
    </div>
    <div class="bgdrop" id="bgDrop">＋ Upload, drop or paste an image — it's saved here as an option</div>
    <div class="opac">Fade <input type="range" min="0" max="100" value="${op}" id="bgOp"><b id="bgOpV" style="width:38px;text-align:right">${op}%</b></div>`;
  qa("[data-bg]",box).forEach(el=>el.onclick=e=>{if(!e.target.closest("[data-bgx]"))pick(el.dataset.bg);});
  qa("[data-bgx]",box).forEach(el=>el.onclick=async e=>{
    e.stopPropagation();
    const c=bgList.find(x=>x.id===el.dataset.bgx);
    if(!confirm(`Delete the background “${(c&&c.name)||""}”? Anything using it goes back to plain.`))return;
    const was=(getBg()||{}).id===el.dataset.bgx;
    await deleteCustomBg(el.dataset.bgx);
    if(was)setBg({id:allowDefault?"default":"none",opacity:(getBg()||{}).opacity??100});
    redraw();applyBg();
  });
  const drop=q("#bgDrop",box);
  drop.onclick=()=>{bgPick=pick;q("#bgFile").click();};
  drop.ondragover=e=>{e.preventDefault();drop.classList.add("over");};
  drop.ondragleave=()=>drop.classList.remove("over");
  drop.ondrop=async e=>{e.preventDefault();drop.classList.remove("over");
    const id=await addCustomBg(e.dataTransfer.files[0]);if(id)pick(id);};
  const rng=q("#bgOp",box);
  rng.oninput=()=>{const v=q("#bgOpV",box);if(v)v.textContent=rng.value+"%";
    setBg({id:(getBg()||{}).id||"none",opacity:+rng.value});applyBg();};
}
q("#bgFile").addEventListener("change",async e=>{
  const f=e.target.files[0];e.target.value="";if(!f)return;
  const cb=bgPick;bgPick=null;
  const id=await addCustomBg(f);
  if(id&&cb)cb(id);
});
/* pasting an image while a picker is on screen makes it a background */
document.addEventListener("paste",e=>{
  if(!activeBgPicker)return;
  if(!document.body.contains(activeBgPicker.box)){activeBgPicker=null;return;}
  for(const it of e.clipboardData?.items||[]){
    if(it.type.startsWith("image/")){
      e.preventDefault();e.stopPropagation();
      const f=it.getAsFile(),cb=activeBgPicker.pick;
      addCustomBg(f).then(id=>{if(id&&cb)cb(id);});
      return;
    }
  }
},true);

/* =============== undo / redo =============== */
const HIST={undo:[],redo:[]};
function pushOp(op){HIST.undo.push(op);if(HIST.undo.length>50)HIST.undo.shift();HIST.redo=[];refreshHistBtns();}
function refreshHistBtns(){
  const u=q("#uBtn"),r=q("#rBtn");
  if(u)u.disabled=!HIST.undo.length;
  if(r)r.disabled=!HIST.redo.length;
}
async function applyOp(op,inv){
  if(op.t==="book"||op.t==="del"){
    const body=op.t==="del"?(inv?op.body:null):(inv?op.before:op.after);
    const id=op.t==="del"?op.body.id:op.id;
    const knownKeys=imgKeysOf((op.t==="del"?op.body:op.after)||null);
    if(body){
      const clone=JSON.parse(JSON.stringify(body));
      await dbPut("books",clone);
      const i=books.findIndex(x=>x.id===id);
      if(i>=0)books[i]=clone;else books.unshift(clone);
      if(SYNC.on){if(deletions[id]){delete deletions[id];saveDeletions();}enqueue({kind:"book",id});enqueue({kind:"cover",id});imgKeysOf(clone).forEach(key=>enqueue({kind:"img",key}));}
    }else{
      await dbDel("books",id);
      books=books.filter(x=>x.id!==id);
      if(SYNC.on){deletions[id]=Date.now();saveDeletions();enqueue({kind:"bookDel",id});enqueue({kind:"coverDel",id});knownKeys.forEach(key=>enqueue({kind:"imgDel",key}));}
    }
    if(view==="book"&&cur&&cur.id===id){
      if(!body){view="library";render();}else{openBook(id,false);}
      refreshHistBtns();return;
    }
  }
  if(op.t==="meta"){
    const v=inv?op.before:op.after;
    genres=JSON.parse(JSON.stringify(v.genres));
    dnfCustom=[...v.dnfCustom];audCustom=[...v.audCustom];
    metaSnap=JSON.stringify({genres,dnfCustom,audCustom});
    dbPut("meta",{k:"genres",v:genres});dbPut("meta",{k:"dnfReasons",v:dnfCustom});dbPut("meta",{k:"audiences",v:audCustom});
    enqueue({kind:"meta",key:"genres"});enqueue({kind:"meta",key:"dnfReasons"});enqueue({kind:"meta",key:"audiences"});
    if(view==="book"&&cur){openBook(cur.id,false);refreshHistBtns();return;}
  }
  render();refreshHistBtns();
}
async function doUndo(){const op=HIST.undo.pop();if(!op)return;HIST.redo.push(op);await applyOp(op,true);}
async function doRedo(){const op=HIST.redo.pop();if(!op)return;HIST.undo.push(op);await applyOp(op,false);}

/* =============== library =============== */
const GROUPS=[["none","none"],["genre","genre"],["author","author"],["series","series"],["type","standalone / series / story"],["status","status"]];
const TYPES=[["standalone","Standalone"],["series","Part of a series"],["collection","Collections & their stories"]];
function sortCmp(a,b){
  if(sortBy==="newest")return(b.created||0)-(a.created||0);
  if(sortBy==="rating")return(b.rating??-1)-(a.rating??-1);
  if(sortBy==="title")return(a.title||"").localeCompare(b.title||"");
  if(sortBy==="author")return(a.author||"").localeCompare(b.author||"");
  if(sortBy==="status"){const rk=x=>x.dnf?1:statusOf(x)==="finished"?0:statusOf(x)==="want"?2:3;
    return rk(a)-rk(b)||(a.title||"").localeCompare(b.title||"");}
  if(sortBy==="genre"){const g=x=>((x.genres||[])[0]||"").toLowerCase();const ga=g(a),gb=g(b);
    if(ga&&!gb)return -1;if(!ga&&gb)return 1;
    return ga.localeCompare(gb)||(a.title||"").localeCompare(b.title||"");}
  if(sortBy==="type"){const rk=x=>typeOf(x)==="standalone"?0:typeOf(x)==="series"?1:2;
    return rk(a)-rk(b)||(a.series||"").localeCompare(b.series||"")
      ||(parseFloat(a.seriesNum)||0)-(parseFloat(b.seriesNum)||0)||(a.title||"").localeCompare(b.title||"");}
  return 0;
}
/* -> [{label,color?,items[]}] in display order */
function groupsFor(list){
  const out=[];
  if(groupBy==="genre"){
    const map={},none=[];
    list.forEach(b=>{const gs=b.genres||[];if(!gs.length)none.push(b);gs.forEach(g=>(map[g]=map[g]||[]).push(b));});
    Object.keys(map).sort((a,b)=>a.localeCompare(b)).forEach(k=>out.push({label:k,color:genres[k]||"#78716c",items:map[k]}));
    if(none.length)out.push({label:"No genre yet",color:"#a8a29e",items:none});
  }else if(groupBy==="author"){
    const map={};
    list.forEach(b=>{const a=(b.author||"").trim()||"Unknown author";(map[a]=map[a]||[]).push(b);});
    Object.keys(map).sort((a,b)=>lastName(a).localeCompare(lastName(b))||a.localeCompare(b)).forEach(k=>out.push({label:k,items:map[k]}));
  }else if(groupBy==="series"){
    const map={},none=[];
    list.forEach(b=>{const s=(b.series||"").trim();if(s)(map[s]=map[s]||[]).push(b);else none.push(b);});
    Object.keys(map).sort((a,b)=>a.localeCompare(b)).forEach(k=>out.push({label:k,
      items:map[k].slice().sort((x,y)=>(parseFloat(x.seriesNum)||0)-(parseFloat(y.seriesNum)||0))}));
    if(none.length)out.push({label:"Not in a series",items:none});
  }else if(groupBy==="type"){
    TYPES.forEach(([k,l])=>{const items=list.filter(b=>typeOf(b)===k);if(items.length)out.push({label:l,items});});
  }else if(groupBy==="status"){
    STATUSES.forEach(([k,l])=>{const items=list.filter(b=>statusOf(b)===k);if(items.length)out.push({label:l,items});});
  }
  return out;
}
function booksHtml(list,withDel){
  return layout==="list"?list.map(b=>rowHtml(b,withDel)).join(""):`<div class="grid">${list.map(gridHtml).join("")}</div>`;
}
function renderLibrary(){
  const m=q("#main");
  const counts={all:books.length,finished:books.filter(b=>statusOf(b)==="finished").length,reading:books.filter(b=>statusOf(b)==="reading").length,want:books.filter(b=>statusOf(b)==="want").length};
  const list=books.filter(b=>statusFilter==="all"||statusOf(b)===statusFilter).sort(sortCmp);
  let html="";
  if(books.length){
    html+=`<div class="pills">${[["all","All"],["finished","Finished"],["reading","Reading"],["want","Want to read"]].map(([id,l])=>`<button class="pill ${statusFilter===id?"on":""}" data-sf="${id}">${l} <b>${counts[id]}</b></button>`).join("")}</div>`;
    html+=`<div class="pills"><span class="lbl">Sort:</span>${["newest","rating","title","author","status","genre","type"].map(s=>`<button class="pill ${sortBy===s?"on2":""}" data-sort="${s}">${s}</button>`).join("")}
      <button class="laybtn" id="layTog">${layout==="list"?"▦ Grid":"☰ List"}</button></div>`;
    html+=`<div class="pills"><span class="lbl">Group under headings:</span>${GROUPS.map(([id,l])=>`<button class="pill ${groupBy===id?"on":""}" data-gb="${id}">${l}</button>`).join("")}</div>`;
  }
  if(!books.length)html+='<div class="empty">📖<br>Your shelf is empty. Add your first book to start.</div>';
  else if(!list.length)html+='<div class="none" style="text-align:center;padding:40px 0">No books with this status yet.</div>';
  else if(groupBy==="none")html+=booksHtml(list,true);
  else{
    const gs=groupsFor(list);
    html+=gs.map(g=>`<div class="grouphead">${g.color
        ?`<span class="chip big" style="background:${g.color}">${esc(g.label)}</span>`
        :`<h2 class="serif" style="margin:0;font-size:17px">${esc(g.label)}</h2>`}
      <span class="n">${g.items.length}</span><span class="ghline"></span></div>${booksHtml(g.items,true)}`).join("");
  }
  m.innerHTML=html;
  qa("[data-sf]",m).forEach(b=>b.onclick=()=>{statusFilter=b.dataset.sf;renderLibrary();});
  qa("[data-sort]",m).forEach(b=>b.onclick=()=>{sortBy=b.dataset.sort;renderLibrary();});
  qa("[data-gb]",m).forEach(b=>b.onclick=()=>{groupBy=b.dataset.gb;renderLibrary();});
  const lt=q("#layTog",m);if(lt)lt.onclick=()=>{layout=layout==="list"?"grid":"list";renderLibrary();};
  wireOpen(m,true);
  hydrateCovers(m);
}

async function deleteBookById(id){
  const b=books.find(x=>x.id===id);
  if(!confirm(`Delete “${(b&&b.title)||"Untitled"}” and all its pictures?`))return;
  if(b)pushOp({t:"del",body:JSON.parse(JSON.stringify(b))});
  await dbDel("books",id);
  books=books.filter(x=>x.id!==id);
  if(SYNC.on){deletions[id]=Date.now();saveDeletions();enqueue({kind:"bookDel",id});enqueue({kind:"coverDel",id});imgKeysOf(b).forEach(key=>enqueue({kind:"imgDel",key}));}
  if(view==="book"){view="library";}
  render();
}

async function refreshStorage(){
  const card=q("#stoCard");if(!card)return;
  const si=await storageInfo();
  const snaps=await dbAll("snapshots");
  const snapBytes=snaps.reduce((s,x)=>s+(x.size||0),0);
  const nCov=(await dbAllKeys("covers")).length,nImg=(await dbAllKeys("images")).length;
  const counts=`${books.length} book${books.length===1?"":"s"} · ${nCov} cover${nCov===1?"":"s"} · ${nImg} picture${nImg===1?"":"s"} · ${snaps.length} backup${snaps.length===1?"":"s"} (${fmtBytes(snapBytes)})`;
  if(!q("#stoCard"))return;
  if(si&&si.quota){
    const pct=si.usage/si.quota*100;
    q("#stoCard").innerHTML=`
      <div class="hrow2"><span class="bignum">${fmtBytes(si.usage)}</span><span class="none">used of ${fmtBytes(si.quota)} available on this device</span></div>
      <div class="bar"><i class="${pct>90?"full":pct>70?"warn":""}" style="width:${Math.max(1,Math.min(100,pct))}%"></i></div>
      <div class="none">${counts}</div>
      ${pct>90?'<div class="hint" style="color:var(--rose);margin-top:7px">Nearly full — export a backup, then delete some pictures or old backups.</div>':""}`;
  }else{
    q("#stoCard").innerHTML=`<div class="none">${counts}</div><div class="hint" style="margin-top:7px">This browser won't tell the app how much room is left.</div>`;
  }
}
async function refreshSnaps(){
  const box=q("#snapList");if(!box)return;
  const list=(await dbAll("snapshots")).sort((a,b)=>b.at-a.at);
  if(!q("#snapList"))return;
  const n=q("#snapN");if(n)n.textContent=list.length?`(${list.length})`:"";
  q("#snapList").innerHTML=list.length?list.map(s=>`
    <div class="snap">
      <div><div class="when">${fmtWhen(s.at)}</div><div class="meta">${s.nbooks} book${s.nbooks===1?"":"s"} · ${fmtBytes(s.size)}</div></div>
      <span class="tagx ${s.auto?"":"man"}">${s.auto?"AUTO":"SAVED"}</span>
      <div class="sp">
        <button class="btn" data-sr="${s.id}">Restore</button>
        <button class="btn" data-sd="${s.id}" title="Download as a file">⭳</button>
        <button class="btn danger" data-sx="${s.id}" title="Delete this backup">✕</button>
      </div>
    </div>`).join(""):'<div class="none" style="margin-top:9px">No backups yet.</div>';
  qa("[data-sr]",box).forEach(b=>b.onclick=async()=>{
    const s=await dbGet("snapshots",b.dataset.sr);if(!s)return;
    if(!confirm(`Restore the backup from ${fmtWhen(s.at)}?\n\nIt holds ${s.nbooks} book${s.nbooks===1?"":"s"}. Books you've added since are kept; any book also in the backup goes back to its backed-up version.\n\nA backup of right now is taken first, so you can undo this.`))return;
    const msg=q("#busyMsg");if(msg)msg.textContent="Restoring…";
    try{
      await makeSnapshot(true);
      const cnt=await applyBackup(JSON.parse(s.data));
      render();
      alert(`Restored ${cnt} book${cnt===1?"":"s"} from ${fmtWhen(s.at)}.`);
    }catch(e){alert("That backup couldn't be restored.");}
    if(q("#busyMsg"))q("#busyMsg").textContent="";
  });
  qa("[data-sd]",box).forEach(b=>b.onclick=async()=>{
    const s=await dbGet("snapshots",b.dataset.sd);if(!s)return;
    downloadJson(s.data,`my-shelf-backup-${new Date(s.at).toISOString().slice(0,10)}.json`);
  });
  qa("[data-sx]",box).forEach(b=>b.onclick=async()=>{
    const s=await dbGet("snapshots",b.dataset.sx);if(!s)return;
    if(!confirm(`Delete the backup from ${fmtWhen(s.at)}? This can't be undone.`))return;
    await dbDel("snapshots",s.id);refreshSnaps();refreshStorage();
  });
}

function renderSearchBody(){
  const m=q("#sbody");
  const qlc=S.q.trim().toLowerCase();
  const authors={};books.forEach(b=>{const a=(b.author||"").trim();if(a)authors[a]=(authors[a]||0)+1;});
  const authorList=Object.entries(authors).sort((x,y)=>lastName(x[0]).localeCompare(lastName(y[0]))||x[0].localeCompare(y[0]));
  const topAuthor=Object.entries(authors).sort((x,y)=>y[1]-x[1])[0]||null;
  const gcount={};books.forEach(b=>(b.genres||[]).forEach(g=>gcount[g]=(gcount[g]||0)+1));
  const allG=Object.keys(genres).sort((a,b)=>a.localeCompare(b));
  const seriesMap={};books.forEach(b=>{const s=(b.series||"").trim();if(s)(seriesMap[s]=seriesMap[s]||[]).push(b);});
  const buckets=[];for(let i=1;i<=9;i++)buckets.push({label:`${i}.0 – ${i}.9`,min:i,max:i+.999});buckets.push({label:"10",min:10,max:10});
  const bCount=b=>books.filter(e=>e.rating!=null&&e.rating>=b.min&&e.rating<=b.max).length;
  const unrated=books.filter(e=>e.rating==null).length;
  const favN=books.filter(b=>b.favorite).length,dnfN=books.filter(b=>b.dnf).length;
  const readN=books.filter(b=>statusOf(b)==="reading").length,wantN=books.filter(b=>statusOf(b)==="want").length;

  let results=null,heading="";
  const matchScope=(b,s)=>{switch(s){
    case "title":return (b.title||"").toLowerCase().includes(qlc)||(b.entries||[]).some(en=>(en.title||"").toLowerCase().includes(qlc));
    case "author":return (b.author||"").toLowerCase().includes(qlc);
    case "series":return (b.series||"").toLowerCase().includes(qlc);
    case "genre":return (b.genres||[]).some(g=>g.toLowerCase().includes(qlc));
    case "keyword":return (b.keywords||[]).some(k=>k.toLowerCase().includes(qlc));
    case "quotes":return stripHtml((b.quotes||[]).join(" ")).toLowerCase().includes(qlc);
    case "summary":return stripHtml((b.summary||"")+" "+(b.entries||[]).map(en=>en.summary||"").join(" ")).toLowerCase().includes(qlc);
    case "notes":return stripHtml((b.canvasText||"")+" "+(b.entries||[]).map(en=>en.notes||"").join(" ")).toLowerCase().includes(qlc);
    case "lists":return stripHtml([...(b.pros||[]),...(b.cons||[])].join(" ")).toLowerCase().includes(qlc);
  }return false;};
  if(qlc){
    results=books.filter(b=>S.scopes.some(s=>matchScope(b,s)));
    heading=`“${esc(S.q)}” in ${SCOPES.filter(([id])=>S.scopes.includes(id)).map(([,l])=>l).join(", ")}`;
  }else if(S.filter){
    const f=S.filter;
    if(f.type==="author")results=books.filter(b=>(b.author||"").trim()===f.value);
    if(f.type==="genre")results=books.filter(b=>(b.genres||[]).includes(f.value));
    if(f.type==="favorite")results=books.filter(b=>b.favorite);
    if(f.type==="dnf")results=books.filter(b=>b.dnf);
    if(f.type==="status")results=books.filter(b=>statusOf(b)===f.value);
    if(f.type==="audience")results=books.filter(b=>(b.audience||"").trim()===f.value);
    if(f.type==="pages")results=f.value==="none"?books.filter(b=>!parseInt(b.pages)):books.filter(b=>{const p=parseInt(b.pages);return p&&p>=f.value.min&&p<=f.value.max;});
    if(f.type==="series")results=books.filter(b=>(b.series||"").trim()===f.value).sort((a,b)=>(parseFloat(a.seriesNum)||0)-(parseFloat(b.seriesNum)||0));
    if(f.type==="rating")results=f.value==="unrated"?books.filter(b=>b.rating==null):books.filter(b=>b.rating!=null&&b.rating>=f.value.min&&b.rating<=f.value.max);
    heading=esc(f.label);
  }else if(S.multi.length){
    results=books.filter(b=>S.multi.every(g=>(b.genres||[]).includes(g)));
    heading="Tagged: "+S.multi.map(esc).join(" + ");
  }

  let html="";
  if(results){
    html+=`<div class="sec"><div class="heading"><h2 class="serif">${heading}</h2><span class="n">(${results.length})</span><button class="clearbtn" id="sclear">✕ Clear</button></div>
      ${results.length?results.map(b=>rowHtml(b,false)).join(""):'<div class="none" style="text-align:center;padding:30px 0">Nothing here yet.</div>'}</div>`;
  }
  if(!results||S.multi.length){
    if(!results){
      html+=`<div class="sec"><h2 class="serif">Collections</h2>
        <button class="colbtn f" data-cf="favorite" ${favN?"":"disabled"}>♥ Favorites <b>${favN}</b></button>
        <button class="colbtn r" data-cf="reading" ${readN?"":"disabled"}>📖 Reading now <b>${readN}</b></button>
        <button class="colbtn w" data-cf="want" ${wantN?"":"disabled"}>★ Want to read <b>${wantN}</b></button>
        <button class="colbtn d" data-cf="dnf" ${dnfN?"":"disabled"}><span class="bdnf" style="background:#57534e;color:#fff">DNF</span> Did not finish <b>${dnfN}</b></button>
      </div>`;
      const audCounts={};books.forEach(b=>{const a=(b.audience||"").trim();if(a)audCounts[a]=(audCounts[a]||0)+1;});
      const audAll=[...new Set([...DEFAULT_AUD,...audCustom,...Object.keys(audCounts)])];
      html+=`<div class="sec"><h2 class="serif">Who it's for</h2>${audAll.map(a=>{const n=audCounts[a]||0;return `<button class="aut" data-aud="${esc(a)}" ${n?"":'disabled style="opacity:.4;cursor:default"'}>${esc(a)} <b>${n}</b></button>`;}).join("")}</div>`;
      if(books.length){
        html+=`<div class="sec pickbox"><h2 class="serif" style="margin-bottom:8px">🎲 Pick for me</h2>
          <div class="inrow">
            <select id="pkg" class="field" style="width:auto;padding:6px 10px;font-size:13px">
              <option value="any">Any genre</option>${allG.map(g=>`<option value="${esc(g)}" ${S.pickGenre===g?"selected":""}>${esc(g)}</option>`).join("")}
            </select>
            <label style="font-size:13px;color:var(--mut);display:flex;gap:5px;align-items:center"><input type="checkbox" id="pkw" ${S.pickWant?"checked":""}> from my want-to-read pile</label>
            <button class="pickbtn" id="pkb">${S.picked&&S.picked!=="none"?"Pick again":"Pick"}</button>
          </div>
          <div id="pkres" style="margin-top:10px">${S.picked==="none"?'<span class="none">Nothing matches — try unchecking the want-to-read filter or another genre.</span>':S.picked?rowHtml(S.picked,false):""}</div>
        </div>`;
      }
      html+=`<div class="sec"><h2 class="serif">Authors <span class="n" style="font-weight:400;font-size:13px;color:var(--faint)">(${authorList.length})</span></h2>
        <input class="field" id="aq" placeholder="Filter authors…" value="${esc(S.authorQ)}" style="margin-bottom:8px;font-size:13px;padding:7px 11px">
        <div id="authChips"></div></div>`;
      if(Object.keys(seriesMap).length){
        html+=`<div class="sec"><h2 class="serif">Series</h2>${Object.entries(seriesMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([s,arr])=>{
          const total=Math.max(0,...arr.map(b=>parseInt(b.seriesTotal)||0));
          return `<button class="aut" data-ser="${esc(s)}">${esc(s)} <b>${arr.length}${total?` of ${total}`:""}</b></button>`;}).join("")}</div>`;
      }
      html+=`<div class="sec"><h2 class="serif">Genres</h2>${Object.entries(gcount).sort((a,b)=>a[0].localeCompare(b[0])).map(([g,n])=>`<button data-gen="${esc(g)}" style="border:none;background:none;padding:0"><span class="chip big" style="background:${genres[g]||"#78716c"}">${esc(g)} <b>${n}</b></span></button>`).join("")||'<span class="none">No genres yet.</span>'}</div>`;
    }
    html+=`<div class="sec"><h2 class="serif">Combine genres</h2><div class="hint">Check several — shows only books that carry <b>all</b> of them.</div>
      ${allG.map(g=>{const on=S.multi.includes(g);return `<button class="mg ${on?"on":""}" data-mg="${esc(g)}" style="${on?`background:${genres[g]};border-color:${genres[g]}`:""}"><span class="bx">${on?"✓":""}</span>${esc(g)}</button>`;}).join("")||'<span class="none">No genres yet.</span>'}</div>`;
    if(!results){
      html+=`<div class="sec"><h2 class="serif">Ratings</h2><div class="rbuckets">
        ${buckets.map(b=>{const n=bCount(b);return `<button class="rb ${n?"has":"no"}" ${n?`data-rb="${b.min}"`:""}><span>★ ${b.label}</span><b>${n}</b></button>`;}).join("")}

      const lenCounts=LEN_BUCKETS.map(bk=>books.filter(b=>{const p=parseInt(b.pages);return p&&p>=bk.min&&p<=bk.max;}).length);

async function openBook(id,fresh){
  const found=books.find(b=>b.id===id);
  isNew=!found;
  cur=Object.assign(blankBook(id),found?JSON.parse(JSON.stringify(found)):{});
  const c=await dbGet("covers",id);curCover=c?c.data:null;
  curImgs={};
  for(const im of cur.images||[]){const d=await loadImgData(id+"|"+im.id);if(d)curImgs[im.id]=d;}
  curEnt={};
  for(const en of cur.entries||[]){if(!en.cover)continue;const d=await loadImgData(id+"|"+en.id);if(d)curEnt[en.id]=d;}
  arrange=false;view="book";renderEditor();
}

function setSaved(ok){const el=q("#saveMsg");if(el){el.textContent=ok?"Saved":"Saving…";el.className="savemsg "+(ok?"ok":"no");}}
async function commitCur(){
  const after=JSON.parse(JSON.stringify(cur));
  const i=books.findIndex(b=>b.id===cur.id);
  const before=i>=0?JSON.parse(JSON.stringify(books[i])):null;
  const strip=o=>{const c={...o};delete c.modified;return JSON.stringify(c);};
  if(before&&strip(before)===strip(after)){setSaved(true);return;}
  after.modified=Date.now();cur.modified=after.modified;
  pushOp({t:"book",id:cur.id,before,after:JSON.parse(JSON.stringify(after))});
  await dbPut("books",after);
  if(i>=0)books[i]=after;else books.unshift(after);
  if(SYNC.on){if(deletions[cur.id]){delete deletions[cur.id];saveDeletions();}enqueue({kind:"book",id:cur.id});}
  isNew=false;setSaved(true);
}
function scheduleSave(){
  setSaved(false);clearTimeout(saveTimer);
  saveTimer=setTimeout(commitCur,700);
}

    const all=[...DEFAULT_DNF,...dnfCustom];
    w.innerHTML=`<div class="dnfbox"><div class="cap">Why it wasn't finished</div>
      <div>${all.map(r=>`<button class="rsn ${cur.dnfReasons.includes(r)?"on":""}" data-r="${esc(r)}">${cur.dnfReasons.includes(r)?"✓ ":""}${esc(r)}</button>`).join("")}</div>
      <div class="inrow" style="margin-top:8px"><input class="field" id="dnfIn" placeholder="Add your own reason…" style="flex:1;font-size:13px;padding:7px 10px">
      <button class="pill on2" id="dnfAdd" style="border:none">Add</button></div></div>`;
    qa("[data-r]",w).forEach(x=>x.onclick=()=>{const r=x.dataset.r;
      cur.dnfReasons=cur.dnfReasons.includes(r)?cur.dnfReasons.filter(y=>y!==r):[...cur.dnfReasons,r];
      renderDnf();scheduleSave();});
    q("#dnfAdd",w).onclick=()=>{const v=q("#dnfIn",w).value.trim();if(!v)return;
      if(![...DEFAULT_DNF,...dnfCustom].includes(v)){dnfCustom.push(v);saveMeta();}
      if(!cur.dnfReasons.includes(v))cur.dnfReasons.push(v);
      renderDnf();scheduleSave();};
    q("#dnfIn",w).addEventListener("keydown",e=>{if(e.key==="Enter")q("#dnfAdd",w).click();});
  }
  renderDnf();

  /* audience */
  function renderAud(){
    const w=q("#audWrap");
    const audAll=[...new Set([...DEFAULT_AUD,...audCustom,...(cur.audience?[cur.audience]:[])])];
    w.innerHTML=`<div class="lbl" style="display:block;margin-bottom:3px">Who it's for</div><div>
      ${audAll.map(a=>`<button class="rsn ${cur.audience===a?"on":""}" data-a="${esc(a)}">${cur.audience===a?"✓ ":""}${esc(a)}</button>`).join("")}
      <input id="audIn" class="addin" style="width:150px;display:inline-block;margin:2px 0 0 2px" placeholder="Add… (Enter)"></div>`;
    qa("[data-a]",w).forEach(x=>x.onclick=()=>{cur.audience=cur.audience===x.dataset.a?"":x.dataset.a;renderAud();scheduleSave();});
    q("#audIn",w).addEventListener("keydown",e=>{
      if(e.key==="Enter"&&e.target.value.trim()){
        const v=e.target.value.trim();
        if(![...DEFAULT_AUD,...audCustom].includes(v)){audCustom.push(v);saveMeta();}
        cur.audience=v;renderAud();scheduleSave();}});
  }
  renderAud();

  /* keywords */
  function addKw(t){
    const v=(t||"").trim();if(!v)return;
    if(cur.keywords.some(k=>k.toLowerCase()===v.toLowerCase()))return;
    cur.keywords.push(v);renderKw();scheduleSave();
  }
  function renderKw(){
    const w=q("#kwWrap");
    const others=[...new Set(books.flatMap(b=>b.id===cur.id?[]:(b.keywords||[])))];
    const btext=stripHtml([cur.title,cur.summary,cur.canvasText,...(cur.quotes||[]),...(cur.pros||[]),...(cur.cons||[])].join(" ")).toLowerCase();
    const sug=others.filter(k=>!cur.keywords.some(x=>x.toLowerCase()===k.toLowerCase())&&btext.includes(k.toLowerCase())).slice(0,10);
    w.innerHTML=`<div class="lbl" style="display:block;margin:10px 0 3px">Keywords</div>
      <div>${cur.keywords.map((k,i)=>`<span class="kw" style="font-size:12px;padding:2px 7px">${esc(k)} <span class="x" data-kx="${i}" style="cursor:pointer;opacity:.6">✕</span></span>`).join("")}</div>
      <input id="kwIn" class="addin" placeholder='Add keyword… (Enter) — or turn on 🏷 Tag mode and click words in the text'>
      ${sug.length?`<div class="hint" style="margin-top:5px">Suggestions: ${sug.map(k=>`<span class="kw" data-ks="${esc(k)}" style="cursor:pointer;font-size:11px;padding:1px 6px;border-style:dashed">＋ ${esc(k)}</span>`).join("")}</div>`:""}`;
    qa("[data-kx]",w).forEach(x=>x.onclick=()=>{cur.keywords.splice(+x.dataset.kx,1);renderKw();scheduleSave();});
    qa("[data-ks]",w).forEach(x=>x.onclick=()=>addKw(x.dataset.ks));
    q("#kwIn",w).addEventListener("keydown",e=>{if(e.key==="Enter"&&e.target.value.trim()){addKw(e.target.value);e.target.value="";}});
  }
  renderKw();

  /* genres */
  let pendingGenre=null;
  function renderGenres(){
    q("#genChips").innerHTML=cur.genres.map(g=>`<span class="chip big" style="background:${genres[g]||"#78716c"}">${esc(g)} <span class="x" data-gx="${esc(g)}">✕</span></span>`).join("");
    qa("[data-gx]").forEach(x=>x.onclick=()=>{cur.genres=cur.genres.filter(g=>g!==x.dataset.gx);renderGenres();scheduleSave();});
    const v=q("#fGenre").value.trim();
    const sug=v&&!pendingGenre?Object.keys(genres).filter(g=>g.toLowerCase().includes(v.toLowerCase())&&!cur.genres.includes(g)):[];
    q("#genSug").innerHTML=sug.slice(0,10).map(g=>`<span class="chip" style="background:${genres[g]};cursor:pointer" data-gs="${esc(g)}">${esc(g)}</span>`).join("");
    qa("[data-gs]").forEach(x=>x.onclick=()=>addGenre(x.dataset.gs,null));
    q("#genPick").innerHTML=pendingGenre?`<div class="colorpick"><div class="hint" style="margin:0">Pick a color for <b>${esc(pendingGenre)}</b> — it will stay this color everywhere:</div>
      <div class="dots">${PALETTE.map(c=>`<button class="cdot" data-gc="${c}" style="background:${c}"></button>`).join("")}</div></div>`:"";
    qa("[data-gc]").forEach(x=>x.onclick=()=>addGenre(pendingGenre,x.dataset.gc));
  }
  function addGenre(name,color){
    const clean=(name||"").trim();if(!clean)return;
    if(!genres[clean]){
      if(!color){pendingGenre=clean;renderGenres();return;}
      genres[clean]=color;saveMeta();
    }
    if(!cur.genres.includes(clean))cur.genres.push(clean);
    pendingGenre=null;q("#fGenre").value="";
    renderGenres();scheduleSave();
  }
  q("#fGenre").addEventListener("input",()=>{pendingGenre=null;renderGenres();});
  q("#fGenre").addEventListener("keydown",e=>{if(e.key==="Enter")addGenre(q("#fGenre").value,null);});
  renderGenres();

  /* lists */
  function renderList(key){
    const box=q("#list-"+key);
    const quote=key==="quotes";
    box.innerHTML=cur[key].map((it,i)=>`<div class="li ${quote?"q":""}">
      ${quote?'<span class="qm">“</span>':`<span class="dot" style="background:${key==="pros"?"#10b981":"#fb7185"}"></span>`}
      <div contenteditable="true" data-li="${i}"></div>
      <button class="lx" data-lx="${i}">✕</button></div>`).join("");
    qa("[data-li]",box).forEach(el=>{el.innerHTML=cur[key][+el.dataset.li];
      el.addEventListener("input",()=>{cur[key][+el.dataset.li]=el.innerHTML;scheduleSave();});});
    qa("[data-lx]",box).forEach(x=>x.onclick=()=>{cur[key].splice(+x.dataset.lx,1);renderList(key);scheduleSave();});
  }
  ["pros","cons","quotes"].forEach(k=>{
    renderList(k);
    q("#add-"+k).addEventListener("keydown",e=>{
      if(e.key==="Enter"&&e.target.value.trim()){
        cur[k].push(esc(e.target.value.trim()));e.target.value="";renderList(k);scheduleSave();}});
  });

  /* cover */
  q("#coverBox").onclick=()=>q("#coverFile").click();
  q("#coverFile").onchange=async e=>{
    const f=e.target.files[0];e.target.value="";if(!f)return;
    curCover=await compressImage(f,600,.85);
    await dbPut("covers",{id:cur.id,data:curCover});
    coverCache.set(cur.id,curCover);SYNC.triedCover.delete(cur.id);
    q("#coverBox").innerHTML=`<img src="${curCover}">`;
    if(SYNC.on)enqueue({kind:"cover",id:cur.id});
    cur.coverV=Date.now();scheduleSave();
  };

  /* pictures */
  q("#imgFile").onchange=e=>{[...e.target.files].forEach(addPicture);e.target.value="";};
  page.addEventListener("paste",e=>{
    if(activeBgPicker)return;   /* background picker is open — let it take the image */
    for(const it of e.clipboardData?.items||[]){
      if(it.type.startsWith("image/")){e.preventDefault();addPicture(it.getAsFile());return;}}});

  async function addPicture(file){
    if(!file||!file.type.startsWith("image/"))return;
    let data;try{data=await compressImage(file);}catch(err){alert("That image couldn't be read.");return;}
    const rect=page.getBoundingClientRect();
    const baseY=Math.max(20,-rect.top+160);
    const im={id:uid(),x:30+(cur.images.length*26)%180,y:baseY+(cur.images.length*18)%90,w:240,behind:false};
    try{await dbPut("images",{key:cur.id+"|"+im.id,data});}catch(err){alert("That image couldn't be saved.");return;}
    curImgs[im.id]=data;cur.images.push(im);
    if(SYNC.on)enqueue({kind:"img",key:cur.id+"|"+im.id});
    if(!arrange){arrange=true;page.classList.add("arr");const btn=q("#edArr");btn.classList.add("on");btn.innerHTML="✥ Done arranging";}
    renderImages();scheduleSave();
  }

  function pageMin(){
    if(!cur.images.length){page.style.minHeight="";return;}
    page.style.minHeight=Math.max(...cur.images.map(i=>i.y+i.w*1.2+160))+"px";
  }
  function renderImages(){
    const layer=q("#imgLayer");
    layer.innerHTML=cur.images.map(im=>curImgs[im.id]?`
      <div class="scrap ${im.behind?"bh":""}" data-im="${im.id}" style="left:${im.x}px;top:${im.y}px;width:${im.w}px">
        <img src="${curImgs[im.id]}" draggable="false">
        <div class="sbar">
          <button class="sfade ${im.behind?"on":""}" title="${im.behind?"Make fully visible":"Fade so text shows through"}">◐</button>
          <button class="sdel" title="Delete image">✕</button>
        </div>
        <div class="rs"></div>
      </div>`:"").join("");
    qa(".scrap",layer).forEach(el=>{
      const im=cur.images.find(i=>i.id===el.dataset.im);
      q(".sfade",el).onclick=e=>{e.stopPropagation();im.behind=!im.behind;renderImages();scheduleSave();};
      q(".sdel",el).onclick=e=>{e.stopPropagation();
        delete curImgs[im.id];
        if(SYNC.on)enqueue({kind:"imgDel",key:cur.id+"|"+im.id});
        cur.images=cur.images.filter(i=>i.id!==im.id);renderImages();scheduleSave();};
      const startDrag=(e,mode)=>{
        if(!arrange)return;
        if(e.target.closest(".sbar"))return;
        e.preventDefault();
        const sx=e.clientX,sy=e.clientY,{x,y,w}=im;
        const maxX=Math.max(40,page.clientWidth-60);
        const mv=ev=>{
          if(mode==="drag"){im.x=Math.min(maxX,Math.max(0,x+ev.clientX-sx));im.y=Math.max(0,y+ev.clientY-sy);}
          else im.w=Math.max(60,Math.min(1400,w+ev.clientX-sx));
          el.style.left=im.x+"px";el.style.top=im.y+"px";el.style.width=im.w+"px";};
        const up=()=>{window.removeEventListener("pointermove",mv);window.removeEventListener("pointerup",up);pageMin();scheduleSave();};
        window.addEventListener("pointermove",mv);window.addEventListener("pointerup",up);};
      el.addEventListener("pointerdown",e=>{
        if(e.target.closest(".rs"))startDrag(e,"resize");else startDrag(e,"drag");});
    });
    pageMin();
  }
  renderImages();
  applyBg();
}

function finishSaveThen(fn){
  if(q("#saveMsg")&&q("#saveMsg").textContent==="Saving…"){
    clearTimeout(saveTimer);
    commitCur().then(fn);
  }else fn();
}

/* =============== backup, snapshots & storage =============== */
const fmtBytes=n=>{if(n==null)return "–";const u=["B","KB","MB","GB"];let i=0,v=n;
  while(v>=1024&&i<u.length-1){v/=1024;i++;}
  return (i===0||v>=10?Math.round(v):v.toFixed(1))+" "+u[i];};
const fmtWhen=t=>new Date(t).toLocaleString(undefined,{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});

async function storageInfo(){
  try{if(navigator.storage&&navigator.storage.estimate){const e=await navigator.storage.estimate();
    return {usage:e.usage||0,quota:e.quota||0};}}catch(e){}
  return null;
}
function saveSettings(){dbPut("meta",{k:"settings",v:settings});}

/* one shared shape for export, snapshots and import — keeps the old file compatible */
async function buildBackup(){
  const covers={};(await dbAll("covers")).forEach(c=>covers[c.id]=c.data);
  const images={};(await dbAll("images")).forEach(i=>images[i.key]=i.data);
  return {app:"my-shelf",version:1,exported:new Date().toISOString(),
    index:books.map(b=>({id:b.id})),books,genres,dnfReasons:dnfCustom,audiences:audCustom,covers,images};
}
function downloadJson(json,name){
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=name;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}
async function exportBackup(){
  const msg=q("#busyMsg");if(msg)msg.textContent="Packing your shelf…";
  try{
    downloadJson(JSON.stringify(await buildBackup()),`my-shelf-backup-${new Date().toISOString().slice(0,10)}.json`);
  }catch(e){alert("Export ran into a problem — try again.");}
  if(q("#busyMsg"))q("#busyMsg").textContent="";
}
/* merges a backup in: existing books kept, matching ones updated */
async function applyBackup(data){
  if(!data||data.app!=="my-shelf"||!Array.isArray(data.books))throw new Error("not a shelf backup");
  for(const b of data.books)await dbPut("books",b);
  for(const[id,c]of Object.entries(data.covers||{})){await dbPut("covers",{id,data:c});coverCache.delete(id);SYNC.triedCover.delete(id);}
  for(const[k,d]of Object.entries(data.images||{}))await dbPut("images",{key:k,data:d});
  const map=new Map(books.map(b=>[b.id,b]));
  for(const b of data.books)map.set(b.id,b);
  books=[...map.values()];
  genres=Object.assign({},data.genres||{},genres);
  dnfCustom=[...new Set([...dnfCustom,...(data.dnfReasons||[])])];
  audCustom=[...new Set([...audCustom,...(data.audiences||[])])];
  saveMeta();
  if(SYNC.on){
    for(const b of data.books){delete deletions[b.id];enqueue({kind:"book",id:b.id});}
    for(const id of Object.keys(data.covers||{}))enqueue({kind:"cover",id});
    for(const k of Object.keys(data.images||{}))enqueue({kind:"img",key:k});
    saveDeletions();flushQueue();
  }
  return data.books.length;
}

async function makeSnapshot(auto){
  const json=JSON.stringify(await buildBackup());
  const snap={id:uid(),at:Date.now(),auto:!!auto,size:json.length,nbooks:books.length,data:json};
  await dbPut("snapshots",snap);
  await pruneSnapshots();
  return snap;
}
async function pruneSnapshots(){
  const autos=(await dbAll("snapshots")).filter(s=>s.auto).sort((a,b)=>b.at-a.at);
  for(const s of autos.slice(Math.max(1,settings.keepAuto|0)))await dbDel("snapshots",s.id);
}
async function maybeAutoBackup(){
  if(!settings.autoBackup||!books.length)return;
  const last=(await dbAll("snapshots")).filter(s=>s.auto).sort((a,b)=>b.at-a.at)[0];
  if(last&&Date.now()-last.at<24*3600*1000)return;
  try{await makeSnapshot(true);}catch(e){console.warn("[shelf] auto-backup skipped",e);}
}

q("#importFile").addEventListener("change",async e=>{
  const f=e.target.files[0];e.target.value="";if(!f)return;
  const msg=q("#busyMsg");if(msg)msg.textContent="Restoring from backup…";
  try{
    const n=await applyBackup(JSON.parse(await f.text()));
    render();
    alert(`Restored ${n} book${n===1?"":"s"} from the backup. Existing books were kept; matching ones were updated.${SYNC.on?" Uploading to your cloud now…":""}`);
  }catch(err){alert("That file couldn't be read as a shelf backup.");}
  if(q("#busyMsg"))q("#busyMsg").textContent="";
});
